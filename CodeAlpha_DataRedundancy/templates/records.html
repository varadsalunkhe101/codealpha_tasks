<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Records</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='bootstrap.min.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='bootstrap-icons.min.css') }}">
</head>

<body>

<div class="container mt-5">
    <div class="card-header">
        <h2 class="text-center">
            <i class="bi bi-database">Stored Records</i>
        </h2>
    </div>
    <div class="card shadow">
        <div class="card-body">
            <form method="GET" action="/records" class="mb-3">
                <div class="btns">
                    <a href="/"
                       class="btn btn-success mb-3">
                        <i class="bi bi-plus-circle mt-2 w-25">Add Record</i>
                    </a>

                    <a href="/logs" class="btn btn-warning mb-3 w-25">
                        <i class="bi bi-files">Duplicate Logs</i>
                    </a>

                    <a href="/dashboard" class="btn btn-dark mb-3 w-25">
                        <i class="bi bi-grid">Dashboard</i>
                    </a>
                </div>

                <div class="input-group">
                    <input type="text"
                           name="search"
                           class="form-control"
                           placeholder="Search by Name, Email or Phone">

                    <button class="btn btn-primary">
                        <i class="bi bi-search">Search</i>
                    </button>

                    <a href="/records" class="btn btn-secondary">
                        <i class="bi bi-arrow-clockwise">Reset</i>
                    </a>
                </div>

            </form>

            <table class="table table-bordered table-striped">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                {% if records|length == 0 %}
                <tr>
                    <td colspan="5" class="text-center text-danger">
                        No Records Found
                    </td>
                </tr>
                {% endif %}

                {% for row in records %}

                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>
                        <a href="/delete/{{ row[0] }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure?')"> <i class="bi bi-trash"></i>

                            Delete
                        </a>
                    </td>
                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>

</body>
</html>
